name: Initialize new repo

on:
  push:
    branches: [main]

jobs:
  init-repo:
    runs-on: ubuntu-latest
    steps:
      - name: Enable discussions
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ADMIN_PAT }}
          script: |
            const { owner, repo } = context.repo;
            await github.rest.repos.update({ owner, repo, has_discussions: true });
            console.log('Discussions enabled');

      - name: Require validate check on main
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ADMIN_PAT }}
          script: |
            const { owner, repo } = context.repo;

            // Idempotency: skip if already enforced
            let existingChecks = [];
            try {
              const { data: existing } = await github.rest.repos.getBranchProtection({
                owner, repo, branch: 'main',
              });
              existingChecks = existing?.required_status_checks?.checks ?? [];
            } catch (e) {
              if (e.status !== 404) throw e;
            }

            if (existingChecks.some(c => c.context === 'validate')) {
              console.log('Branch protection already enforces validate check — nothing to do.');
              return;
            }

            await github.rest.repos.updateBranchProtection({
              owner,
              repo,
              branch: 'main',
              required_status_checks: {
                strict: false,
                checks: [{ context: 'validate' }],
              },
              enforce_admins: false,
              required_pull_request_reviews: null,
              restrictions: null,
            });

            // Verify the protection was actually applied
            const { data: protection } = await github.rest.repos.getBranchProtection({
              owner, repo, branch: 'main',
            });
            const applied = (protection?.required_status_checks?.checks ?? [])
              .some(c => c.context === 'validate');
            if (!applied) {
              throw new Error(
                "updateBranchProtection succeeded but 'validate' is not present in the " +
                "enforced checks. The check may not have run on this repo yet — open a PR " +
                "to register the check context, then re-run this workflow step."
              );
            }

            console.log('Branch protection set: validate check required on main');